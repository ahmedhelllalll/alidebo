<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Cross-Fade Carousel</title>
    <style>
        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0f0f11; /* Dark sleek background */
        }

        /* Carousel Container */
        .carousel-container {
            position: relative;
            width: 850px;
            max-width: 95%;
            height: 480px;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Slides Wrapper */
        .carousel-slides {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000; /* Prevents white flashes during transitions */
        }

        /* Individual Slide */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            
            /* Cinematic Fade + Scale Setup */
            opacity: 0;
            visibility: hidden;
            transform: scale(1.03); 
            
            /* Using a custom cubic-bezier for a snappy start and smooth deceleration.
               will-change hints the browser to use GPU acceleration.
            */
            transition: opacity 1000ms cubic-bezier(0.4, 0, 0.2, 1), 
                        transform 1000ms cubic-bezier(0.4, 0, 0.2, 1),
                        visibility 1000ms;
            will-change: opacity, transform;
            
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Active Slide State */
        .slide.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1); /* Settles down to natural scale */
        }

        /* Content Styling */
        .slide-content {
            color: white;
            text-align: center;
            z-index: 2;
            padding: 40px;
            /* Text subtle fade-up animation inside active slide */
            transform: translateY(10px);
            opacity: 0;
            transition: transform 800ms cubic-bezier(0.4, 0, 0.2, 1) 200ms,
                        opacity 800ms ease 200ms;
        }

        .slide.active .slide-content {
            transform: translateY(0);
            opacity: 1;
        }

        .slide-content h2 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        .slide-content p {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 300;
        }

        /* Dark overlay for rich contrast */
        .slide::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.5));
            z-index: 1;
        }

        /* Rich Gradients for Visuals */
        .slide:nth-child(1) { background: linear-gradient(135deg, #1f1c2c, #928dab); }
        .slide:nth-child(2) { background: linear-gradient(135deg, #2c3e50, #000000); }
        .slide:nth-child(3) { background: linear-gradient(135deg, #a80077, #667db6); }

        /* Minimal Navigation Indicators (Dots) */
        .carousel-dots {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            cursor: pointer;
            transition: background 0.4s ease, transform 0.4s ease, width 0.4s ease;
        }

        /* "Pill" effect for the active dot */
        .dot.active {
            background: #ffffff;
            width: 24px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="carousel-container" aria-roledescription="carousel" aria-label="Cinematic Showcase">
        <div class="carousel-slides">
            <div class="slide active" role="group" aria-roledescription="slide" aria-label="1 of 3">
                <div class="slide-content">
                    <h2>Cinematic Fluidity</h2>
                    <p>Enhanced with hardware-accelerated transitions.</p>
                </div>
            </div>
            <div class="slide" role="group" aria-roledescription="slide" aria-label="2 of 3">
                <div class="slide-content">
                    <h2>Pure Minimalism</h2>
                    <p>Removed heavy UI arrows for a cleaner aesthetic.</p>
                </div>
            </div>
            <div class="slide" role="group" aria-roledescription="slide" aria-label="3 of 3">
                <div class="slide-content">
                    <h2>Refined Motion</h2>
                    <p>Cubic-bezier mathematics ensure realistic pacing.</p>
                </div>
            </div>
        </div>

        <div class="carousel-dots">
            <button class="dot active" aria-label="Go to slide 1"></button>
            <button class="dot" aria-label="Go to slide 2"></button>
            <button class="dot" aria-label="Go to slide 3"></button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slides = document.querySelectorAll('.slide');
            const dots = document.querySelectorAll('.dot');
            
            let currentIndex = 0;
            const totalSlides = slides.length;
            let autoPlayTimer;
            const intervalTime = 5000; // 5 Seconds per slide

            function updateCarousel(index) {
                if (index === currentIndex) return;

                // Old active slide begins fading out
                slides[currentIndex].classList.remove('active');
                dots[currentIndex].classList.remove('active');

                // Update pointer
                currentIndex = index;

                // New active slide begins fading in
                slides[currentIndex].classList.add('active');
                dots[currentIndex].classList.add('active');
            }

            function nextSlide() {
                const nextIndex = (currentIndex + 1) % totalSlides;
                updateCarousel(nextIndex);
            }

            // Dot pagination clicks
            dots.forEach((dot, index) => {
                dot.addEventListener('click', () => {
                    updateCarousel(index);
                    resetAutoPlay();
                });
            });

            // Clean Auto-play cycles
            function startAutoPlay() {
                autoPlayTimer = setInterval(nextSlide, intervalTime);
            }

            function resetAutoPlay() {
                clearInterval(autoPlayTimer);
                startAutoPlay();
            }

            // Init
            startAutoPlay();
        });
    </script>
</body>
</html>
