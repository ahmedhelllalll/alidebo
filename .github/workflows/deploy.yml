name: Deploy API via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        server-dir: ./public_html/
        # الاستبعادات المظبوطة لحماية السيرفر ونضافة الـ Build
        exclude: |
          **/.git*
          **/.git*/**
          node_modules/**
          vendor/**
          storage/**
          *.zip
          *.rar
          *.tar.gz
          *.log
          .DS_Store
          .env
          .env.*
          .phpactor.json
          .phpunit.result.cache
          .fleet/**
          .idea/**
          .nova/**
          .phpunit.cache/**
          .vscode/**
          .zed/**
          auth.json
          public/hot/**
          public/storage
          Homestead.json
          Homestead.yaml
          Thumbs.db
          tmp/**
          tmp_extracted/**
          tmp_new_update/**