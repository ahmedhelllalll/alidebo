<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Premium Gallery</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #0a0a0a; }
body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0a; color: #e8e4dc; min-height: 200vh; }

/* ── Lenis ── */
html.lenis { height: auto; }
.lenis.lenis-smooth { scroll-behavior: auto; }

/* ─────────────────────────────────────────────────
   GRID  (1–6 images)
───────────────────────────────────────────────── */
.gallery-grid { display: grid; gap: 2px; }

/* --- count-1 ------------------------------------------------ */
.gallery-grid.count-1 { grid-template-columns: 1fr; }
.gallery-grid.count-1 .gallery-item { aspect-ratio: 16/7; }
@media (max-width: 640px) {
  .gallery-grid.count-1 .gallery-item { aspect-ratio: 4/3; }
}

/* --- count-2 ------------------------------------------------ */
.gallery-grid.count-2 { grid-template-columns: repeat(2, 1fr); }
.gallery-grid.count-2 .gallery-item { aspect-ratio: 3/4; }
@media (max-width: 480px) {
  .gallery-grid.count-2 { grid-template-columns: 1fr; }
  .gallery-grid.count-2 .gallery-item { aspect-ratio: 4/3; }
}

/* --- count-3 ------------------------------------------------ */
.gallery-grid.count-3 { grid-template-columns: repeat(3, 1fr); }
.gallery-grid.count-3 .gallery-item { aspect-ratio: 3/4; }
@media (max-width: 640px) {
  .gallery-grid.count-3 { grid-template-columns: repeat(2, 1fr); }
  .gallery-grid.count-3 .gallery-item:last-child { grid-column: 1 / -1; aspect-ratio: 16/7; }
}
@media (max-width: 380px) {
  .gallery-grid.count-3 { grid-template-columns: 1fr; }
  .gallery-grid.count-3 .gallery-item { aspect-ratio: 4/3; }
  .gallery-grid.count-3 .gallery-item:last-child { grid-column: auto; aspect-ratio: 4/3; }
}

/* --- count-4 ------------------------------------------------ */
.gallery-grid.count-4 { grid-template-columns: repeat(2, 1fr); }
.gallery-grid.count-4 .gallery-item { aspect-ratio: 4/3; }
@media (max-width: 480px) {
  .gallery-grid.count-4 { grid-template-columns: 1fr; }
}

/* --- count-5 ------------------------------------------------ */
.gallery-grid.count-5 {
  grid-template-columns: repeat(6, 1fr);
  grid-template-rows: auto auto;
}
.gallery-grid.count-5 .gallery-item:nth-child(1),
.gallery-grid.count-5 .gallery-item:nth-child(2),
.gallery-grid.count-5 .gallery-item:nth-child(3) { grid-column: span 2; aspect-ratio: 4/3; }
.gallery-grid.count-5 .gallery-item:nth-child(4),
.gallery-grid.count-5 .gallery-item:nth-child(5) { grid-column: span 3; aspect-ratio: 16/9; }
@media (max-width: 640px) {
  .gallery-grid.count-5 { grid-template-columns: repeat(2, 1fr); }
  .gallery-grid.count-5 .gallery-item { grid-column: auto !important; aspect-ratio: 4/3 !important; }
}
@media (max-width: 380px) {
  .gallery-grid.count-5 { grid-template-columns: 1fr; }
}

/* --- count-6 ------------------------------------------------ */
.gallery-grid.count-6 { grid-template-columns: repeat(3, 1fr); }
.gallery-grid.count-6 .gallery-item { aspect-ratio: 4/3; }
@media (max-width: 640px) {
  .gallery-grid.count-6 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 380px) {
  .gallery-grid.count-6 { grid-template-columns: 1fr; }
}

/* ─────────────────────────────────────────────────
   GALLERY ITEM
───────────────────────────────────────────────── */
.gallery-item {
  position: relative;
  overflow: hidden;
  cursor: pointer;
  background: #111;
}
.gallery-item img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transform-origin: center;
  will-change: transform;
}
.gallery-item-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.1) 45%, transparent 100%);
  opacity: 0;
  transition: opacity 0.4s ease;
  display: flex; align-items: flex-end;
  padding: clamp(0.75rem, 2vw, 1.5rem);
}
@media (hover: hover) {
  .gallery-item:hover .gallery-item-overlay { opacity: 1; }
  .gallery-item:hover .gallery-item-label { transform: translateY(0); }
}
/* On touch devices always show label */
@media (hover: none) {
  .gallery-item-overlay { opacity: 1; background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 40%); }
  .gallery-item-label { transform: translateY(0) !important; }
}
.gallery-item-label {
  font-size: clamp(0.6rem, 1.2vw, 0.72rem);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.75);
  transform: translateY(8px);
  transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
}

/* ─────────────────────────────────────────────────
   LIGHTBOX
───────────────────────────────────────────────── */
#lightbox {
  position: fixed; inset: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0;
}
#lightbox.active { pointer-events: all; }
#lightbox-backdrop {
  position: absolute; inset: 0;
  background: rgba(4,4,4,0.96);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
#lightbox-img-wrap {
  position: relative; z-index: 1;
  width: 90vw; max-width: 1100px;
  max-height: 80vh;
  display: flex; align-items: center; justify-content: center;
}
#lightbox-img {
  max-width: 100%; max-height: 80vh;
  object-fit: contain; display: block;
  border: 1px solid rgba(255,255,255,0.05);
  user-select: none; -webkit-user-drag: none;
}
#lightbox-close {
  position: absolute; top: clamp(0.75rem, 3vw, 1.5rem); right: clamp(0.75rem, 3vw, 1.5rem); z-index: 2;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; transition: background 0.2s;
  touch-action: manipulation;
}
#lightbox-close:hover { background: rgba(255,255,255,0.14); }
#lightbox-counter {
  position: absolute; bottom: clamp(0.75rem, 3vw, 1.5rem); left: 50%; transform: translateX(-50%); z-index: 2;
  font-size: 0.65rem; letter-spacing: 0.22em; color: rgba(255,255,255,0.3); text-transform: uppercase;
  white-space: nowrap;
}
#lightbox-prev, #lightbox-next {
  position: absolute; top: 50%; transform: translateY(-50%); z-index: 2;
  width: 48px; height: 48px; border-radius: 50%;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; transition: background 0.2s;
  touch-action: manipulation;
}
#lightbox-prev { left: clamp(0.5rem, 2vw, 1.25rem); }
#lightbox-next { right: clamp(0.5rem, 2vw, 1.25rem); }
#lightbox-prev:hover, #lightbox-next:hover { background: rgba(255,255,255,0.14); }
#lightbox-prev:disabled, #lightbox-next:disabled { opacity: 0.2; pointer-events: none; }

/* On very small screens push nav arrows to bottom strip */
@media (max-width: 480px) {
  #lightbox-prev, #lightbox-next { top: auto; bottom: 3rem; transform: none; }
  #lightbox-prev { left: 25%; transform: translateX(-50%); }
  #lightbox-next { right: 25%; transform: translateX(50%); }
}

/* ─────────────────────────────────────────────────
   CAROUSEL  (7-10 images)
───────────────────────────────────────────────── */
.carousel-wrap { position: relative; overflow: hidden; }
.carousel-track { display: flex; gap: 2px; will-change: transform; }
.carousel-slide {
  flex: 0 0 var(--slide-w, 33.333%);
  position: relative; aspect-ratio: 4/3;
  overflow: hidden; cursor: pointer; background: #111;
}
.carousel-slide img { width: 100%; height: 100%; object-fit: cover; display: block; will-change: transform; }
.carousel-slide .gallery-item-overlay { opacity: 0; }
@media (hover: hover) {
  .carousel-slide:hover .gallery-item-overlay { opacity: 1; }
  .carousel-slide:hover .gallery-item-label { transform: translateY(0); }
}
@media (hover: none) {
  .carousel-slide .gallery-item-overlay { opacity: 1; background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 40%); }
  .carousel-slide .gallery-item-label { transform: translateY(0) !important; }
}

/* Carousel nav */
.carousel-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 0 0;
}
.carousel-btn {
  width: 42px; height: 42px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12); background: transparent;
  color: rgba(255,255,255,0.65); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; transition: border-color 0.2s, color 0.2s, background 0.2s;
  touch-action: manipulation;
}
.carousel-btn:hover { border-color: rgba(255,255,255,0.3); color: #fff; background: rgba(255,255,255,0.06); }
.carousel-btn:disabled { opacity: 0.2; pointer-events: none; }
.carousel-dots { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: center; }
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.18);
  transition: background 0.3s, transform 0.3s; cursor: pointer;
}
.dot.active { background: rgba(255,255,255,0.72); transform: scale(1.45); }

/* ─────────────────────────────────────────────────
   SECTION HEADER
───────────────────────────────────────────────── */
.section-eyebrow {
  font-size: clamp(0.58rem, 1.5vw, 0.65rem);
  letter-spacing: 0.26em; text-transform: uppercase;
  color: rgba(255,255,255,0.28); margin-bottom: 0.85rem;
}
.section-title {
  font-size: clamp(1.85rem, 6vw, 3.6rem);
  font-weight: 300; letter-spacing: -0.025em; line-height: 1.06; color: #e8e4dc;
}
.section-title em { font-style: italic; color: rgba(232,228,220,0.38); }

/* ─────────────────────────────────────────────────
   COUNT SWITCHER
───────────────────────────────────────────────── */
.count-btn {
  padding: 0.2rem 0.65rem; border-radius: 4px;
  font-size: 0.7rem; border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.45); background: transparent; cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  touch-action: manipulation;
}
.count-btn:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.8); }
.count-btn.active { border-color: rgba(255,255,255,0.38); color: #fff; }

/* ── Reveal ── */
.reveal-item { opacity: 0; transform: translateY(28px); }
</style>
</head>
<body>

<div style="height:8vh"></div>

<section id="gallery-section" class="px-4 sm:px-8 md:px-12 lg:px-20 py-16 sm:py-24 max-w-screen-xl mx-auto">

  <!-- Header -->
  <div class="mb-10 sm:mb-14 reveal-item">
    <p class="section-eyebrow">Selected works</p>
    <h2 class="section-title">Moments <em>crafted</em><br>with intention</h2>
  </div>

  <!-- Count switcher -->
  <div class="flex flex-wrap gap-1.5 mb-8 sm:mb-10 reveal-item" id="count-switcher">
    <span style="font-size:0.6rem;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.22);align-self:center;margin-right:4px;">Preview</span>
    <button class="count-btn" data-count="1">1</button>
    <button class="count-btn" data-count="2">2</button>
    <button class="count-btn" data-count="3">3</button>
    <button class="count-btn" data-count="4">4</button>
    <button class="count-btn" data-count="5">5</button>
    <button class="count-btn active" data-count="6">6</button>
    <button class="count-btn" data-count="7">7</button>
    <button class="count-btn" data-count="8">8</button>
    <button class="count-btn" data-count="10">10</button>
  </div>

  <!-- Gallery container -->
  <div id="gallery-container" class="reveal-item"></div>

</section>

<div style="height:20vh"></div>

<!-- ── Lightbox ── -->
<div id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
  <div id="lightbox-backdrop"></div>
  <button id="lightbox-prev" aria-label="Previous">&#8592;</button>
  <div id="lightbox-img-wrap">
    <img id="lightbox-img" src="" alt="" />
  </div>
  <button id="lightbox-next" aria-label="Next">&#8594;</button>
  <button id="lightbox-close" aria-label="Close">&#x2715;</button>
  <div id="lightbox-counter"></div>
</div>

<script>
/* ══════════════════ DATA ══════════════════ */
const IMAGES = [
  { src:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1400&q=80', label:'Alpine Solitude' },
  { src:'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1400&q=80', label:'Golden Hour' },
  { src:'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1400&q=80', label:'Emerald Valley' },
  { src:'https://images.unsplash.com/photo-1470770903676-69b98201ea1c?w=1400&q=80', label:'Still Waters' },
  { src:'https://images.unsplash.com/photo-1418065460487-3e41a6c84dc5?w=1400&q=80', label:'Forest Light' },
  { src:'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1400&q=80', label:'Midnight Pass' },
  { src:'https://images.unsplash.com/photo-1482192505345-5852b700f5dc?w=1400&q=80', label:'Desert Dusk' },
  { src:'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1400&q=80', label:'Summit Clouds' },
  { src:'https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=1400&q=80', label:'Coastal Mist' },
  { src:'https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=1400&q=80', label:'River Bend' },
];

/* ══════════════════ LENIS ══════════════════ */
const lenis = new Lenis({ lerp: 0.08, smoothWheel: true });
(function raf(t){ lenis.raf(t); requestAnimationFrame(raf); })(0);

/* ══════════════════ GSAP ══════════════════ */
gsap.registerPlugin(ScrollTrigger);
lenis.on('scroll', ScrollTrigger.update);
gsap.ticker.add(t => lenis.raf(t * 1000));
gsap.ticker.lagSmoothing(0);

/* ══════════════════ STATE ══════════════════ */
let visibleImages = [];
let lightboxIndex = 0;
let isLightboxOpen = false;
let carouselIndex = 0;
let carouselSlidesVisible = 3;
// Drag guard
let _pointerMoved = false;
document.addEventListener('pointerdown', () => { _pointerMoved = false; });
document.addEventListener('pointermove', () => { _pointerMoved = true; });

/* ══════════════════ HELPERS ══════════════════ */
function slidesVisible() {
  const w = window.innerWidth;
  return w <= 480 ? 1 : w <= 768 ? 2 : 3;
}
function killGalleryTriggers() {
  ScrollTrigger.getAll().filter(st => st.vars._g).forEach(st => st.kill());
}

/* ══════════════════ BUILD ══════════════════ */
function buildGallery(count) {
  visibleImages = IMAGES.slice(0, count);
  killGalleryTriggers();
  const c = document.getElementById('gallery-container');
  c.innerHTML = count <= 6 ? buildGrid(visibleImages, count) : buildCarousel(visibleImages);
  if (count <= 6) animateGrid(c); else initCarousel(visibleImages);
  bindClicks(c);
}

/* ── Grid ── */
function buildGrid(imgs, count) {
  return `<div class="gallery-grid count-${count}">${imgs.map((img,i)=>itemHTML(img,i)).join('')}</div>`;
}
function itemHTML(img, i) {
  return `<div class="gallery-item" data-index="${i}" tabindex="0" role="button" aria-label="${img.label}">
    <img src="${img.src}" alt="${img.label}" loading="lazy"/>
    <div class="gallery-item-overlay"><span class="gallery-item-label">${img.label}</span></div>
  </div>`;
}

function animateGrid(c) {
  const items = c.querySelectorAll('.gallery-item');
  gsap.set(items, { opacity:0, y:36, scale:0.97 });
  items.forEach((item, i) => {
    ScrollTrigger.create({
      trigger: item, start:'top 92%', once:true, _g:true,
      onEnter: () => gsap.to(item,{ opacity:1, y:0, scale:1, duration:0.8, delay:(i%3)*0.07, ease:'expo.out' })
    });
    addHoverZoom(item);
  });
}

function addHoverZoom(el) {
  if (window.matchMedia('(hover: none)').matches) return;
  const img = el.querySelector('img');
  el.addEventListener('mouseenter', () => gsap.to(img, { scale:1.07, duration:0.65, ease:'power2.out' }));
  el.addEventListener('mouseleave', () => gsap.to(img, { scale:1,    duration:0.55, ease:'power2.out' }));
}

/* ── Carousel ── */
function buildCarousel(imgs) {
  carouselIndex = 0;
  carouselSlidesVisible = slidesVisible();
  const slideWpct = 100 / carouselSlidesVisible;

  const slides = imgs.map((img,i) => `
    <div class="carousel-slide gallery-item" data-index="${i}" style="flex-basis:calc(${slideWpct}% - 2px)" tabindex="0" role="button" aria-label="${img.label}">
      <img src="${img.src}" alt="${img.label}" loading="lazy"/>
      <div class="gallery-item-overlay"><span class="gallery-item-label">${img.label}</span></div>
    </div>`).join('');

  const maxI = Math.max(0, imgs.length - carouselSlidesVisible);
  const dots = imgs.slice(0, maxI + 1).map((_,i)=>`<div class="dot${i===0?' active':''}" data-dot="${i}"></div>`).join('');

  return `
    <div class="carousel-wrap">
      <div class="carousel-track" id="carousel-track">${slides}</div>
    </div>
    <nav class="carousel-nav" aria-label="Carousel navigation">
      <button class="carousel-btn" id="carousel-prev" disabled>&#8592;</button>
      <div class="carousel-dots" id="carousel-dots">${dots}</div>
      <button class="carousel-btn" id="carousel-next">&#8594;</button>
    </nav>`;
}

function initCarousel(imgs) {
  const track   = document.getElementById('carousel-track');
  const prevBtn = document.getElementById('carousel-prev');
  const nextBtn = document.getElementById('carousel-next');
  const dotsWrap= document.getElementById('carousel-dots');

  const slides = track.querySelectorAll('.carousel-slide');
  gsap.set(slides, { opacity:0, y:28, scale:0.97 });
  ScrollTrigger.create({
    trigger: track, start:'top 92%', once:true, _g:true,
    onEnter: () => gsap.to(slides,{ opacity:1, y:0, scale:1, stagger:0.06, duration:0.75, ease:'expo.out' })
  });
  slides.forEach(s => addHoverZoom(s));

  function maxIdx() { return Math.max(0, imgs.length - carouselSlidesVisible); }

  function updateDots() {
    dotsWrap.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===carouselIndex));
  }
  function updateBtns() {
    prevBtn.disabled = carouselIndex === 0;
    nextBtn.disabled = carouselIndex >= maxIdx();
  }

  function slideWidth() {
    const s = track.querySelector('.carousel-slide');
    return s ? s.offsetWidth + 2 : 0; // +2 for gap
  }

  function goTo(idx) {
    carouselIndex = Math.max(0, Math.min(idx, maxIdx()));
    gsap.to(track, { x: -carouselIndex * slideWidth(), duration:0.75, ease:'expo.inOut' });
    updateDots(); updateBtns();
  }

  prevBtn.addEventListener('click', () => goTo(carouselIndex - 1));
  nextBtn.addEventListener('click', () => goTo(carouselIndex + 1));
  dotsWrap.addEventListener('click', e => {
    const d = e.target.closest('.dot');
    if (d) goTo(+d.dataset.dot);
  });

  /* Swipe / drag */
  let startX = 0;
  track.addEventListener('pointerdown', e => { startX = e.clientX; track.setPointerCapture(e.pointerId); });
  track.addEventListener('pointerup',   e => {
    const dx = e.clientX - startX;
    if (Math.abs(dx) > 44) goTo(dx < 0 ? carouselIndex + 1 : carouselIndex - 1);
  });

  /* Recalculate on resize */
  let resizeTO;
  const resizeObs = new ResizeObserver(() => {
    clearTimeout(resizeTO);
    resizeTO = setTimeout(() => {
      const nv = slidesVisible();
      if (nv !== carouselSlidesVisible) {
        carouselSlidesVisible = nv;
        const pct = 100 / nv;
        slides.forEach(s => { s.style.flexBasis = `calc(${pct}% - 2px)`; });
        // rebuild dots
        const maxI2 = Math.max(0, imgs.length - nv);
        dotsWrap.innerHTML = imgs.slice(0, maxI2+1).map((_,i)=>`<div class="dot${i===0?' active':''}" data-dot="${i}"></div>`).join('');
        carouselIndex = Math.min(carouselIndex, maxIdx());
      }
      gsap.set(track, { x: -carouselIndex * slideWidth() });
      updateDots(); updateBtns();
    }, 80);
  });
  resizeObs.observe(track.parentElement);

  updateBtns();
}

/* ══════════════════ CLICK → LIGHTBOX ══════════════════ */
function bindClicks(container) {
  container.addEventListener('click', e => {
    const item = e.target.closest('[data-index]');
    if (item && !_pointerMoved) openLightbox(+item.dataset.index);
  });
  container.addEventListener('keydown', e => {
    if (e.key==='Enter'||e.key===' ') {
      const item = e.target.closest('[data-index]');
      if (item) openLightbox(+item.dataset.index);
    }
  });
}

/* ══════════════════ LIGHTBOX ══════════════════ */
const lb      = document.getElementById('lightbox');
const lbImg   = document.getElementById('lightbox-img');
const lbCount = document.getElementById('lightbox-counter');
const lbClose = document.getElementById('lightbox-close');
const lbPrev  = document.getElementById('lightbox-prev');
const lbNext  = document.getElementById('lightbox-next');

function openLightbox(index) {
  lightboxIndex = index;
  isLightboxOpen = true;
  lenis.stop();
  document.body.style.overflow = 'hidden';
  lb.classList.add('active');
  setLbImage(false);
  gsap.fromTo(lb,         { opacity:0 }, { opacity:1, duration:0.4, ease:'power2.out' });
  gsap.fromTo(lbImg, { scale:0.88, opacity:0, y:18 }, { scale:1, opacity:1, y:0, duration:0.55, ease:'expo.out', delay:0.04 });
}

function closeLightbox() {
  isLightboxOpen = false;
  lenis.start();
  document.body.style.overflow = '';
  gsap.to(lbImg, { scale:0.9, opacity:0, y:14, duration:0.3, ease:'power2.in' });
  gsap.to(lb, { opacity:0, duration:0.35, ease:'power2.in', delay:0.04,
    onComplete: () => lb.classList.remove('active') });
}

function setLbImage(animate) {
  const img = visibleImages[lightboxIndex];
  lbCount.textContent = `${lightboxIndex+1} \u2014 ${visibleImages.length}`;
  lbPrev.disabled = lightboxIndex === 0;
  lbNext.disabled = lightboxIndex === visibleImages.length - 1;
  if (!animate) { lbImg.src = img.src; lbImg.alt = img.label; return; }
  const dir = animate; // 1 = forward, -1 = back
  gsap.to(lbImg, { opacity:0, x: dir*-24, duration:0.18, ease:'power2.in', onComplete: () => {
    lbImg.src = img.src; lbImg.alt = img.label;
    gsap.fromTo(lbImg, { opacity:0, x: dir*24 }, { opacity:1, x:0, duration:0.32, ease:'power2.out' });
  }});
}

lbClose.addEventListener('click', closeLightbox);
document.getElementById('lightbox-backdrop').addEventListener('click', closeLightbox);
lbPrev.addEventListener('click', () => { if(lightboxIndex>0){ lightboxIndex--; setLbImage(-1); } });
lbNext.addEventListener('click', () => { if(lightboxIndex<visibleImages.length-1){ lightboxIndex++; setLbImage(1); } });

document.addEventListener('keydown', e => {
  if (!isLightboxOpen) return;
  if (e.key==='Escape') closeLightbox();
  if (e.key==='ArrowLeft'  && lightboxIndex>0) { lightboxIndex--; setLbImage(-1); }
  if (e.key==='ArrowRight' && lightboxIndex<visibleImages.length-1) { lightboxIndex++; setLbImage(1); }
});

/* Touch swipe in lightbox */
let lbTx = 0;
lb.addEventListener('touchstart', e => { lbTx = e.touches[0].clientX; }, { passive:true });
lb.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - lbTx;
  if (Math.abs(dx) > 48) {
    if (dx < 0 && lightboxIndex < visibleImages.length-1) { lightboxIndex++; setLbImage(1); }
    if (dx > 0 && lightboxIndex > 0) { lightboxIndex--; setLbImage(-1); }
  }
});

/* ══════════════════ COUNT SWITCHER ══════════════════ */
document.getElementById('count-switcher').addEventListener('click', e => {
  const btn = e.target.closest('.count-btn');
  if (!btn) return;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.toggle('active', b===btn));
  buildGallery(+btn.dataset.count);
});

/* ══════════════════ SECTION REVEAL ══════════════════ */
gsap.set('.reveal-item', { opacity:0, y:28 });
ScrollTrigger.create({
  trigger:'#gallery-section', start:'top 82%', once:true,
  onEnter: () => gsap.to('.reveal-item',{ opacity:1, y:0, stagger:0.1, duration:0.85, ease:'expo.out' })
});

/* ══════════════════ INIT ══════════════════ */
buildGallery(6);
</script>
</body>
